{% extends "base.html" %}

{% block content %}

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- LEFT DESIGN PANEL -->
        <div class="col-md-6 login-left d-flex flex-column
                    justify-content-center align-items-center text-center">

            <h1 class="brand-title">StudyFlow</h1>
            <p class="tagline">Build your study consistency.</p>

            <img src="{{ url_for('static', filename='study.png') }}"
                 class="illustration"
                 alt="Study illustration">

        </div>

        <!-- RIGHT LOGIN PANEL -->
        <div class="col-md-6 d-flex justify-content-center align-items-center">

            <div class="login-card">

    <h2 class="text-center mb-4">Login</h2>

    {% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success text-center">
        {{ success }}
    </div>
    {% endif %}

    <form method="POST">

                    <!-- Email -->
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter email"
                               required>
                    </div>

                    <!-- Password -->
                    <div class="password-box">
                        <label for="password">Password</label>

                        <div class="password-input-wrapper">
                            <input type="password"
                                   id="password"
                                   name="password"
                                   placeholder="Password"
                                   class="form-control"
                                   required>

                            <button type="button"
                                    class="show-password-btn"
                                    onclick="togglePassword()">
                                Show
                            </button>
                        </div>
                    </div>

                    <!-- Forgot Password -->
                    <div class="text-end mb-3">
                        <a href="/forgot-password" class="forgot-link">
                            Forgot Password?
                        </a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn btn-login w-100">
                        Login
                    </button>

                </form>

                <!-- Register Link -->
                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="/register">Register</a>
                </p>

            </div>

        </div>

    </div>
</div>

<!-- Show/Hide Password Script -->
<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const button = document.querySelector(".show-password-btn");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        button.textContent = "Hide";
    } else {
        passwordInput.type = "password";
        button.textContent = "Show";
    }
}
</script>

{% endblock %}
