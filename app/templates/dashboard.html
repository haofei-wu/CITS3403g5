{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="dashboard-card text-center">

        <h2>Welcome, {{ session.user_email }} 👋</h2>

        <p class="text-muted">
            Stay consistent and track your progress 📈
        </p>

        <!-- STATS -->
        <div class="row mt-4">

            <div class="col-md-4">
                <div class="stat-box">
                    <h4>📚 Study Hours</h4>
                    <h2>{{ user.study_hours }} hrs</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-box">
                    <h4>🔥 Streak</h4>
                    <h2>0 days</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-box">
                    <h4>🏆 Rank</h4>
                    <h2>#1</h2>
                </div>
            </div>

        </div>

        <!-- PROGRESS BAR -->
        <div class="mt-5">
            <h5>Daily Goal Progress 🎯</h5>

            <div class="progress">
                <div class="progress-bar"
                     role="progressbar"
                     style="width: {{ (user.study_hours / 5) * 100 }}%;">
                </div>
            </div>

            <small class="text-muted">
                Goal: 5 hours/day
            </small>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="mt-4">

            <a href="/leaderboard" class="btn btn-login me-2">
                Leaderboard 🏆
            </a>

            <a href="/logout" class="btn btn-outline-danger">
                Logout
            </a>

        </div>

    </div>

</div>

{% endblock %}
