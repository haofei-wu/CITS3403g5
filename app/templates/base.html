<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyFlow</title>

    <meta name="csrf-token" content="{{ csrf_token() }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>

<body>

<header class="app-header">

    <!-- ☰ Menu Button -->
    <div class="menu-btn">
        <button id="menubtn">☰</button>
    </div>

    <!-- Sidebar -->
    <div id="menusidebar" class="menu-sidebar">
        <b>StudyFlow 📚</b>
        <a href="{{ url_for('main.index') }}"
        class="{% if request.endpoint == 'main.index' %}active{% endif %}">Home</a>
        <a href="{{ url_for('main.dashboard') }}"
        class="{% if request.endpoint == 'main.dashboard' %}active{% endif %}">Dashboard</a>
        <a href="{{ url_for('main.leaderboard') }}"
        class="{% if request.endpoint == 'main.leaderboard' %}active{% endif %}">Leaderboard</a>
    </div>

    <div id="overlay" class="overlay"></div>

    <!-- Left Title -->
    <div class="header-left fw-bold">
        StudyFlow 📚
    </div>

    <!-- Right Side -->
    <div class="header-right">
        <div class="d-flex align-items-center gap-3">
            {% if current_user.is_authenticated  %}
                <form id="nav-avatar-form"
                    method="POST"
                    action="{{ url_for('main.update_avatar') }}"
                    enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <label class="nav-user" for="nav-avatar-input">
                        <img class="nav-avatar"
                            src="{{ url_for('static', filename=current_user.avatar) }}"
                            alt="Avatar">
                        <span class="userinfo">{{ current_user.nickname }}</span>
                    </label>
                    <input id="nav-avatar-input"
                        class="nav-avatar-input"
                        type="file"
                        name="avatar"
                        accept=".jpg,.jpeg,.png">
                </form>
                <a href="{{ url_for('main.logout') }}" class="btn login-btn">Logout</a>
            {% else %}
                <a href="{{ url_for('main.login') }}" class="btn login-btn">Login</a>
            {% endif %}
            <a href="{{ url_for('main.settings') }}" class="btn login-btn">Settings</a>
        </div>
    </div>

</header>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/base.js') }}"></script>

</body>
</html>
