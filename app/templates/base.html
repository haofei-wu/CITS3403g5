<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>

<body>

<header class="app-header">

    <!-- ☰ Menu Button -->
    <div class="menu-btn">
        <button id="menubtn">☰</button>
    </div>

    <!-- Sidebar -->
    <div id="menusidebar" class="menu-sidebar">
        <b>StudyFlow 📚</b>
        <a href="{{ url_for('index') }}"
        class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a>
        <a href="{{ url_for('login') }}"
        class="{% if request.endpoint == 'login' %}active{% endif %}">Login</a>
        <a href="{{ url_for('dashboard') }}"
        class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="{{ url_for('leaderboard') }}"
        class="{% if request.endpoint == 'leaderboard' %}active{% endif %}">Leaderboard</a>
        <a href="{{ url_for('settings') }}"
        class="{% if request.endpoint == 'settings' %}active{% endif %}">Settings</a>
    </div>

    <div id="overlay" class="overlay"></div>

    <!-- Left Title -->
    <div class="header-left fw-bold">
        StudyFlow 📚
    </div>

    <!-- Right Side -->
    <div class="header-right">

        {% if current_user.is_authenticated  %}
        <div class="d-flex align-items-center gap-3">
            <span class="userinfo">{{ current_user.email }}</span>
            <a href="{{ url_for('logout') }}" class="btn login-btn">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="btn login-btn">Login</a>
        </div>
        {% endif %}
    </div>

</header>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/base.js') }}"></script>

</body>
</html>
