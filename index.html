<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewpoint" content="width= device-width", initial-scale = 1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>
        Pomodoro Test
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">
</head>
<body>
    <header>
        <h1>
            PomodoroTimers
        </h1>
    </header>
    <div class="button-logins">
        <a href="login.html" class="btn login-btn">
            login
        </a>
        <a href="register.html" class="btn login-btn">
            Register
        </a>
    </div>

    <div class="container-fluid py-2">
        <div class="row g-4">

            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body" >
                        <h1 class="card-title">
                            <a href="tasks.html" class="card-link">
                                Today's Tasks→
                            </a>
                        </h1>
                        <ul class="list1">
                            <li class="list_item">Task1</li>
                            <li class="list_item">Task1</li>
                            <li class="list_item">Task1</li>
                            <li class="list_item">... dynamic(future)</li>
                            <!-- 动态列表占位-->
                        </ul>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body" >
                        <h1 class="card-title">
                            <a href="focus_time.html" class="card-link">
                                Today's Focus Time→ 
                            </a>
                        </h1>
                        <p class="show-time">
                            1 h 36 min  dynamic(future)<!-- 动态时间占位 -->
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h1 class="card-title">
                            <a href="timer.html" class="card-link">
                                Pomodoro Timer→ 
                            </a>
                        </h1>
                        <p class="content_text">
                            Simple timer below
                        </p>
                        <p class="timerset" id="simple-timer">
                            15:00
                        </p>
                        <div class="button-timers">
                            <button class="btn start-btn">
                                Start
                            </button>
                            <button class="btn start-btn">
                                Reset
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-body" >
                        <h1 class="card-title">
                            <a href="leaderboard.html" class="card-link">
                                Leaderboard→ 
                            </a>
                        </h1>
                        <p class="content_text">
                            Display the current top three leaders!!!!!!
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
        crossorigin="anonymous">
    </script>
</body>
</html>
