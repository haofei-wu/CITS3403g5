<head>

    <title>

<body>
    <header class="app-header">
        <!--Menu Button-->
        <div class="menu-btn">
            <button id="menubtn">☰</button>
        </div>

        <div id="menusidebar" class="menu-sidebar">
                <b>Pomodoro</b>
                <a href="tasks.html">Tasks</a>
                <a href="timer.html">Timer</a>
                <a href="leaderboard.html">Leaderboard</a>
        </div>

        <div id ="overlay" class="overlay"></div>

        <div class="header-left">
            Pomodoro
        </div>

        <div class="header-right">
            <a href="login.html" class="btn login-btn">
                Login
            </a>
        </div>

    </header>


    <!-- Main content -->
    <div class="container py-4">

        <h2 class="page-title">Dashboard</h2>

        <div class="dashboard-flow">
            
            <!-- Pomodoro Timer Card -->
            <div class="card">
                <div class="card-body">
                    <div class="timer-modes">
                        <button class="mode-btn" data-time="1500">Pomodoro</button>
                        <button class="mode-btn" data-time="300">Short Break</button>
                        <button class="mode-btn" data-time="900">Long Break</button>
                    </div>

                    <p class="content_text">
                        Simple timer below(waiting for timer page dynamic update)
                    </p>

                    <p class="timerset" id="simple-timer">
                        15:00
                    </p>

                    <div class="button-timers">
                        <button class="btn start-btn">Start</button>
                        <button class="btn start-btn">Reset</button>
                    </div>

                </div>
            </div>

            <!--Today's Tasks Card -->
            <div class="card">
                <div class="card-body" >
                    <h1 class="card-title">
                        <a href="tasks.html" class="card-link">
                            Today's Tasks
                        </a>
                    </h1>
                    <ul class="content_text">
                            <li>Task 1</li>
                            <li>Task 2</li>
                            <li>Task 3</li>
                    </ul>
                </div>
            </div>

            <!--No need to show focus time and Leaderborad

            <div class="card">
                <div class="card-body">
                    <h1 class="card-title">
                        <a href="focus_time.html" class="card-link">
                            Today's Focus Time→ 
                        </a>
                    </h1>

                    <p class="show-time">
                        1 h 36 min  dynamic(future)
                    </p>

                </div>
            </div>

            <div class="card">
                <div class="card-body" >
                    <h1 class="card-title">
                        <a href="leaderboard.html" class="card-link">
                            Leaderboard→ 
                        </a>
                    </h1>

                    <p class="content_text">
                        Display the current top three leaders!!!!!!
                    </p>

                </div>
            </div>

            -->
        </div>
    </div>

        crossorigin="anonymous">
    </script>
    <script src="script.js"></script>

</html>
